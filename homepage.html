<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Home</title>

    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <!-- links for tailwind + Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- link for font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- link for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <!-- header part -->
    <header class="border-b-1 border-gray-300 sticky top-0 bg-base-200 z-10">
      <section class="w-11/12 mx-auto flex justify-between items-center py-3">
        <!-- header left part -->
        <div class="left flex gap-1 items-center">
          <div class="logo w-[60px]">
            <img src="./assets/logo.png" alt="" />
          </div>

          <div class="valance-part space-y-[6px]">
            <h2 class="font-bold text-[1.12rem]">
              $<span id="balance-amount">45000</span>
            </h2>

            <p class="text-neutral/50">Available Balance</p>
          </div>
        </div>

        <div class="right">
          <a href="./index.html" class="btn btn-soft"
            ><i class="fa-solid fa-arrow-right-from-bracket"></i> Log out</a
          >
        </div>
      </section>
    </header>

    <section class="welocome-btn-section w-11/12 mx-auto py-10 space-y-5">
      <h2 class="text-3xl font-bold">
        Welcome to Pay<span class="text-primary">oo</span>
      </h2>

      <p class="text-neutral/50">
        Enjoy easy and convenient financial services with us. Cashout charge is
        low and
      </p>

      <!-- buttons -->
      <div class="grid buttons grid-cols-3 gap-3">
        <!-- button 1 -->
        <button onclick="showOnly('add-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-1.png" alt="" />

          <p class="text-neutral/50">Add Money</p>
        </button>

        <!-- button 2 -->
        <button onclick="showOnly('cashout')" class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-2.png" alt="" />

          <p class="text-neutral/50">Cashout</p>
        </button>

        <!-- button 3 -->
        <button onclick="showOnly('transfer-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-3.png" alt="" />

          <p class="text-neutral/50">Transfer Money</p>
        </button>

        <!-- button 4 -->
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-4.png" alt="" />

          <p class="text-neutral/50">Get Bonus</p>
        </button>

        <!-- button 5 -->
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-5.png" alt="" />

          <p class="text-neutral/50">Pay Bill</p>
        </button>

        <!-- button 6 -->
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
          <img src="./assets/opt-6.png" alt="" />

          <p class="text-neutral/50" onclick="showOnly('history')">Transactions</p>
        </button>
      </div>
    </section>

    <!-- add-money section -->
    <section id="add-money" class="w-11/12 mx-auto space-y-4 mb-5 hidden">
      <h2 class="text-neutral font-bold text-xl ">Add Money</h2>

      <div class="card bg-base-100 w-full shadow mx-auto rounded-3xl">
        <div class="card-body">
          <fieldset class="fieldset">

            <label class="label text-neutral/50 font-bold">Select A Bank</label>
            <select id="add-money-bank" class="select rounded-full bg-base-200 w-full">
              <option disabled selected>Select Bank</option>
              <option value="DBBL">DBBL</option>
              <option value="IBBL">IBBL</option>
              <option value="CITY">City Bank</option>
            </select>

            <br>

            <label class="label text-neutral/50 font-bold">Bank Account Number</label>
            <input
              id="add-money-number"
              type="text"
              class="input rounded-full bg-base-200 w-full"
              maxlength="11"
              minlength="11"
              placeholder="Enter 11 digit account number"
              value="01811353353"
            />

            <br />

            <label class="label text-neutral/50 font-bold">Amount Add</label>
            <input
              id="add-money-amount"
              type="number"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Add Amount"
            />

            <br />

            <label class="label text-neutral/50 font-bold">Pin Number</label>
            <input
              id="add-money-pin"
              type="password"
              class="input rounded-full bg-base-200 w-full"
              maxlength="4"
              minlength="4"
              placeholder="Enter 4 digit pin number"
            />

            <button id="add-money-btn" class="btn btn-primary rounded-full mt-4">
              Add Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>

    <!-- cash out section -->
    <section id="cashout" class="w-11/12 mx-auto space-y-4 hidden">
      <h2 class="text-neutral font-bold text-xl">Cash Out</h2>

      <div class="card bg-base-100 w-full shadow mx-auto rounded-3xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral/50 font-bold">Agent Number</label>
            <input
              id="cashout-number"
              type="text"
              class="input rounded-full bg-base-200 w-full"
              maxlength="11"
              minlength="11"
              placeholder="Enter 11 digit number"
              value="01811353353"
            />

            <br />

            <label class="label text-neutral/50 font-bold">Amount</label>
            <input
              id="cashout-amount"
              type="number"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter Amount to withdraw"
            />

            <br />

            <label class="label text-neutral/50 font-bold">Pin Number</label>
            <input
              id="cashout-pin"
              type="password"
              class="input rounded-full bg-base-200 w-full"
              maxlength="4"
              minlength="4"
              placeholder="Enter 4 digit pin number"
            />

            <button id="cahout-btn" class="btn btn-primary rounded-full mt-4">
              Withdraw Money
            </button>
          </fieldset>
        </div>
      </div>
    </section>


    <!-- Transfer Money section -->
    <section id="transfer-money" class="w-11/12 mx-auto space-y-4 hidden">
      <h2 class="text-neutral font-bold text-xl">Transfer Money</h2>

      <div class="card bg-base-100 w-full shadow mx-auto rounded-3xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral/50 font-bold">User Account Number</label>
            <input
              id="transfer-money-number"
              type="text"
              class="input rounded-full bg-base-200 w-full"
              maxlength="11"
              minlength="11"
              placeholder="Enter 11 digit number"
              value="01811353353"
            />

            <br />

            <label class="label text-neutral/50 font-bold">Amount</label>
            <input
              id="transfer-money-amount"
              type="number"
              class="input rounded-full bg-base-200 w-full"
              placeholder="Enter Amount to transfer"
            />

            <br />

            <label class="label text-neutral/50 font-bold">Pin Number</label>
            <input
              id="transfer-money-pin"
              type="password"
              class="input rounded-full bg-base-200 w-full"
              maxlength="4"
              minlength="4"
              placeholder="Enter 4 digit pin number"
            />

            <button id="transfer-money-btn" class="btn btn-primary rounded-full mt-4">
              Send Now
            </button>
          </fieldset>
        </div>
      </div>
    </section>



    <!-- transaction section -->
     <section id="history" class="w-11/12 mx-auto hidden">

      <h2 class="text-neutral font-bold text-xl mb-4">Transaction</h2>

      <div class="space-y-4" id="history-container">

      </div>

     </section>


    <script src="./script/machine.js"></script>
    <script src="./script/addMoney.js"></script>
    <script src="./script/cashout.js"></script>
    <script src="./script/transfer-money.js"></script>
  </body>
</html>
