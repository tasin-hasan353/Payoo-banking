<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payoo | Login</title>

    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />

    <!-- links for tailwind + Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- link for font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- link for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <div class="logo w-[200px] mx-auto pt-35">
      <img src="assets/Logo-full.png" alt="" />
    </div>

    <!-- login form  -->
    <div class="login  pt-10">
      <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto rounded-3xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label text-neutral font-bold">Mobile Number</label>
            <input id="login-number" type="text" class="input rounded-full bg-base-200" maxlength="11" minlength="11" placeholder="Enter your number" value="01811353353"/>
            <label class="label text-neutral font-bold">4 Digit Pin</label>
            <input id="login-pin" type="password" class="input rounded-full bg-base-200" maxlength="4" minlength="4" placeholder="Enter 4 Digit Pin" />
            
            <button id="login-btn" class="btn btn-primary rounded-full mt-4">Login</button>
          </fieldset>
        </div>
      </div>
    </div>


    <script src="./script/login.js"></script>
  </body>
</html>
